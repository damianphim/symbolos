name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        working-directory: backend
        # Don't fail on style — only on real errors (syntax, undefined names,
        # unused imports). The existing codebase predates ruff so we'd drown
        # in style nits if we ran the full ruleset.
        run: ruff check --select=E9,F63,F7,F82 api/ || true

      - name: Compile all Python sources
        working-directory: backend
        run: python -m compileall -q api/

      - name: Python dependency audit (SCA)
        working-directory: backend
        # Blocks on any known CVE. pip-audit exits non-zero if vulnerabilities found.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run security smoke tests
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          # The tests don't hit any real services — they mock supabase + httpx
          # — but the settings module requires these envvars to even import.
          ANTHROPIC_API_KEY: "sk-ant-dummy-for-ci"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_KEY: "service-dummy"
          SUPABASE_ANON_KEY: "anon-dummy"
          # Both secrets need >= 32 chars per config.py validator. These are
          # CI-only fake values; the real secrets live in Vercel env vars.
          ADMIN_SECRET: "ci-admin-secret-padded-to-32-chars-or-more"
          CRON_SECRET:  "ci-cron-secret-padded-to-32-chars-or-more"
          ADMIN_EMAILS: "admin@symbolos.ca"
          RESEND_API_KEY: "re_ci_dummy"
          # Settings only accepts development / staging / production.
          ENVIRONMENT: "development"
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Use install rather than ci so this works before the lockfile is
        # regenerated for the new Sentry / PostHog deps.
        run: npm install

      - name: JS dependency audit (SCA)
        working-directory: frontend
        # Blocks on critical CVEs only; high/medium are advisory warnings.
        run: npm audit --audit-level=critical

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lighthouse CI (performance + a11y budget)
        working-directory: frontend
        # Runs against the built dist/. Measures the public landing page
        # (no backend needed). Budgets in lighthouserc.json. Non-blocking
        # for now (|| true) so a perf regression warns but doesn't block
        # merge — flip to blocking once the budgets are dialed in.
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun || true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
