name: Quarterly secret rotation

# Runs on the 1st of January, April, July, October at 09:00 UTC.
# Also triggerable manually for out-of-cycle rotations.
on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip Vercel updates, just open the issue)'
        required: false
        default: 'false'
        type: boolean

jobs:
  rotate:
    name: Rotate auto-managed secrets + open checklist
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      # ── 1. Generate new secrets ──────────────────────────────────────────────
      - name: Generate new secrets
        id: gen
        run: |
          echo "cron_secret=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"
          echo "admin_secret=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"
          echo "rotation_date=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      # ── 2. Update CRON_SECRET in Vercel (backend project) ───────────────────
      - name: Update CRON_SECRET in Vercel
        if: ${{ inputs.dry_run != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          NEW_VALUE: ${{ steps.gen.outputs.cron_secret }}
        run: |
          VARS=$(curl -sf "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          ENV_ID=$(echo "$VARS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for e in data.get('envs', []):
              if e['key'] == 'CRON_SECRET' and 'production' in e.get('target', []):
                  print(e['id']); break
          ")
          if [ -z "$ENV_ID" ]; then
            echo "CRON_SECRET not found in Vercel — skipping update"
            exit 0
          fi
          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ENV_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\":\"$NEW_VALUE\"}"
          echo "CRON_SECRET updated in Vercel"

      # ── 3. Update ADMIN_SECRET in Vercel (backend project) ──────────────────
      - name: Update ADMIN_SECRET in Vercel
        if: ${{ inputs.dry_run != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          NEW_VALUE: ${{ steps.gen.outputs.admin_secret }}
        run: |
          VARS=$(curl -sf "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          ENV_ID=$(echo "$VARS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for e in data.get('envs', []):
              if e['key'] == 'ADMIN_SECRET' and 'production' in e.get('target', []):
                  print(e['id']); break
          ")
          if [ -z "$ENV_ID" ]; then
            echo "ADMIN_SECRET not found in Vercel — skipping update"
            exit 0
          fi
          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ENV_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"value\":\"$NEW_VALUE\"}"
          echo "ADMIN_SECRET updated in Vercel"

      # ── 4. Trigger a backend redeployment so new secrets take effect ─────────
      - name: Redeploy backend
        if: ${{ inputs.dry_run != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          # Find the latest production deployment and redeploy it
          LATEST=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          DEPLOY_UID=$(echo "$LATEST" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deps = data.get('deployments', [])
          if deps: print(deps[0]['uid'])
          ")
          if [ -z "$DEPLOY_UID" ]; then
            echo "No production deployment found — cannot redeploy"
            exit 0
          fi
          curl -sf -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deploymentId\":\"$DEPLOY_UID\",\"target\":\"production\",\"name\":\"ai-advisor-backend\"}"
          echo "Redeployment triggered for $DEPLOY_UID"

      # ── 5. Open a GitHub issue with the remaining manual checklist ───────────
      - name: Open rotation checklist issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROTATION_DATE: ${{ steps.gen.outputs.rotation_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            AUTO_STATUS="⚠️ DRY RUN — Vercel was NOT updated"
          else
            AUTO_STATUS="✅ Auto-rotated and backend redeployment triggered"
          fi

          gh issue create \
            --title "🔑 Quarterly secret rotation — $ROTATION_DATE" \
            --body "## Auto-rotated
          $AUTO_STATUS

          - [x] \`CRON_SECRET\` — new value in Vercel env
          - [x] \`ADMIN_SECRET\` — new value in Vercel env

          ## Needs manual rotation

          Complete each one, then check it off and close this issue.

          - [ ] **Anthropic API key**
            1. [console.anthropic.com](https://console.anthropic.com) → API Keys → Create new key
            2. Vercel backend project → Settings → Environment Variables → update \`ANTHROPIC_API_KEY\`
            3. Redeploy backend
            4. Delete the old key in Anthropic console

          - [ ] **Supabase service key**
            1. Supabase dashboard → Project Settings → API → Reveal \`service_role\` key
            2. Click **Regenerate** (this invalidates the old key immediately — backend will error until redeployed)
            3. Update \`SUPABASE_SERVICE_KEY\` in Vercel backend env vars
            4. Redeploy backend immediately

          - [ ] **Resend API key**
            1. [resend.com](https://resend.com) → API Keys → Create new key
            2. Update \`RESEND_API_KEY\` in Vercel backend env vars → redeploy
            3. Delete old key

          - [ ] **VERCEL_TOKEN** (used by this workflow)
            1. [vercel.com/account/tokens](https://vercel.com/account/tokens) → Create new token
            2. Update \`VERCEL_TOKEN\` in this repo's GitHub secrets
            3. Delete old Vercel token

          ## If something breaks after Supabase key rotation
          The backend immediately starts returning 401/500. The fix is to redeploy with the new key — no code changes needed." \
            --label "security"
