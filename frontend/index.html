<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Symbolos" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Favicon ─────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
    <title>Symbolos — AI Academic Advisor for McGill Students</title>
    <meta
      name="description"
      content="Plan your McGill degree with AI-powered course recommendations, historical grade data, club discovery, and personalized academic guidance — all in one place."
    />
    <meta
      name="keywords"
      content="McGill University, academic advisor, course planning, degree requirements, McGill courses, grade averages, AI advisor, McGill degree planner, McGill course selection"
    />
    <meta name="author" content="Symbolos" />
    <link rel="canonical" href="https://symbolos.ca" />

    <!-- ── Robots ──────────────────────────────────────────────────────── -->
    <!-- Landing page is public and should be indexed.                     -->
    <!-- Authenticated routes are behind Supabase auth; robots.txt handles -->
    <!-- crawl rules for the rest.                                         -->
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook / LinkedIn / Discord previews) ─────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://symbolos.ca" />
    <meta property="og:title" content="Symbolos — AI Academic Advisor for McGill Students" />
    <meta
      property="og:description"
      content="Plan your McGill degree with AI-powered course recommendations, historical grade data, and personalized academic guidance."
    />
    <meta property="og:image" content="https://symbolos.ca/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Symbolos — AI Academic Advisor for McGill Students" />
    <meta property="og:site_name" content="Symbolos" />
    <meta property="og:locale" content="en_CA" />

    <!-- ── Twitter / X Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@symbolos_ca" />
    <meta name="twitter:title" content="Symbolos — AI Academic Advisor for McGill" />
    <meta
      name="twitter:description"
      content="Plan your McGill degree with AI-powered course recommendations, historical grade data, and personalized academic guidance."
    />
    <meta name="twitter:image" content="https://symbolos.ca/og-image.png" />

    <!-- ── JSON-LD structured data ─────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Symbolos",
      "description": "AI-powered academic advisor for McGill University students. Plan your degree, explore courses with historical grade data, discover clubs, and get personalized guidance.",
      "url": "https://symbolos.ca",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CAD"
      },
      "author": {
        "@type": "Organization",
        "name": "Symbolos",
        "url": "https://symbolos.ca",
        "logo": "https://symbolos.ca/logo.png"
      },
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student"
      }
    }
    </script>

    <!-- ── Theme colour (browser chrome on mobile) ─────────────────────── -->
    <meta name="theme-color" content="#ED1B2F" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- ── Fonts ───────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Apply theme BEFORE React renders to prevent flash of wrong theme -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          var resolved = t === 'dark' ? 'dark'
            : t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark'
            : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
